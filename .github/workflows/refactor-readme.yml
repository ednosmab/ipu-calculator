name: Sync README

on:
  push:
    branches: [main]
    paths:
      - 'package.json'
      - 'docs/skill/**'
      - 'scripts/sync-readme.js'

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Synchronize README
        run: node scripts/sync-readme.js

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --quiet && git diff --staged --quiet || (git commit -m "docs: auto-sync README version and skills [skip ci]" && git push)
